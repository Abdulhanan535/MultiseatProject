name: Build MultiseatProject

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    # ── 1. Checkout code ─────────────────────────────────────
    - name: Checkout
      uses: actions/checkout@v4

    # ── 2. Build the mutex hook DLL ──────────────────────────
    - name: Build mutex hook DLL
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cd service\mutex_hook
        cl /LD /W4 /O2 /nologo /D UNICODE /D _UNICODE mutex_hook.c ^
           /link /DLL /OUT:multiseat_mutex_hook.dll kernel32.lib
        if %errorlevel% neq 0 exit /b %errorlevel%
        echo mutex hook DLL built OK

    # ── 3. Build the control panel EXE (single exe, no service)
    - name: Build control panel
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cd ui
        cl /W4 /O2 /nologo /D UNICODE /D _UNICODE ^
          main.c ^
          ..\service\session_manager.c ^
          ..\service\dll_injector.c ^
          ..\service\termsrv_patch.c ^
          /I ..\shared /I ..\service ^
          /link user32.lib gdi32.lib comctl32.lib advapi32.lib ^
          wtsapi32.lib netapi32.lib userenv.lib ^
          /OUT:MultiseatCtrlPanel.exe /SUBSYSTEM:WINDOWS
        if %errorlevel% neq 0 exit /b %errorlevel%
        echo control panel built OK

    # ── 4. Collect outputs ───────────────────────────────────
    - name: Collect build artifacts
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "artifacts"
        Copy-Item "ui\MultiseatCtrlPanel.exe"                   "artifacts\" -ErrorAction SilentlyContinue
        Copy-Item "service\mutex_hook\multiseat_mutex_hook.dll" "artifacts\" -ErrorAction SilentlyContinue
        Copy-Item "README.md"                                   "artifacts\" -ErrorAction SilentlyContinue
        Write-Host "--- Artifacts ---"
        Get-ChildItem "artifacts"

    # ── 5. Upload as downloadable artifact ──────────────────
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MultiseatProject-build
        path: artifacts/
        retention-days: 30
